<html>
<body>
<h3>Calculadora web</h3>
<script>
   
    function sumar(a, b){
        let resultado = a+b;
        return resultado;
    }
    
    function restar(a, b){
        let resultado = a-b;
        return resultado;
    }

     function multiplicar(a, b){
         
        let resultado = a * b;
        return resultado;
    }
    
    let num1 = parseFloat(prompt("Ingrese el primer numero"));
    let num2 = parseFloat(prompt("Ingrese el segundo numero"));
    
    let resultadofinal = sumar(num1, num2);
    alert("El resultado de la suma es: "+ resultadofinal);
    
    resultadofinal = restar(num1, num2);
    alert("El resultado de la resta es: "+ resultadofinal);
    
    resultadofinal = multiplicar(num1, num2);
    alert("El resultado de la multiplicacion es " + resultadofinal);
    
    
</script>
</body>
</html>
